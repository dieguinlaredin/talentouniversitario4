<div id="step-indicator-container"></div>
<h1 class="page-title">Información Institucional</h1>
<p class="page-subtitle">Datos de tu institución. Verifica que sean correctos y continúa con tu registro.</p>

<form id="form-institucional-lectura" class="form-container form-container--lectura">
  <div class="form-container__grid">
    <div class="form-field">
      <label class="form-field__label" for="lectura-nombre-institucion">Nombre de la Institución</label>
      <input type="text" id="lectura-nombre-institucion" class="form-field__input form-field__input--readonly" name="nombreInstitucion" readonly>
    </div>
    <div class="form-field">
      <label class="form-field__label" for="lectura-cct">CCT (Clave de Centro de Trabajo)</label>
      <input type="text" id="lectura-cct" class="form-field__input form-field__input--readonly" name="cct" readonly>
    </div>
    <div class="form-field">
      <label class="form-field__label" for="lectura-correo">Correo</label>
      <input type="email" id="lectura-correo" class="form-field__input form-field__input--readonly" name="correo" readonly>
    </div>
    <div class="form-field">
      <label class="form-field__label" for="lectura-telefono">Tel&#233;fono</label>
      <input type="tel" id="lectura-telefono" class="form-field__input form-field__input--readonly" name="telefono" readonly>
    </div>
    <div class="form-field">
      <label class="form-field__label" for="lectura-estado">Estado</label>
      <input type="text" id="lectura-estado" class="form-field__input form-field__input--readonly" name="estado" readonly>
    </div>
    <div class="form-field">
      <label class="form-field__label" for="lectura-ciudad">Ciudad</label>
      <input type="text" id="lectura-ciudad" class="form-field__input form-field__input--readonly" name="ciudad" readonly>
    </div>
  </div>
  <div class="form-actions">
    <button type="button" class="btn btn--primary" id="btn-continuar-institucional">Continuar</button>
  </div>
</form>

<p class="security-message">
  <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
  Tu información está segura y solo se comparte con socios de pasantías verificados.
</p>
