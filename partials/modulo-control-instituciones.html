<h1 class="page-title">Control de Instituciones</h1>
<p class="page-subtitle">Gestiona las instituciones registradas. Puedes editar la información o eliminar el registro.</p>

<div id="control-instituciones-list-wrap" class="control-instituciones">
  <p id="control-instituciones-empty" class="control-instituciones__empty" style="display: none;">
    No hay instituciones registradas. Agrega una desde <strong>Información Institucional</strong>.
  </p>
  <div id="control-instituciones-table-wrap" class="control-instituciones__table-wrap" style="display: none;">
    <table class="control-instituciones__table" aria-label="Lista de instituciones">
      <thead>
        <tr>
          <th>Institución</th>
          <th>CCT</th>
          <th>Correo</th>
          <th>Teléfono</th>
          <th>Ciudad</th>
          <th>Estado</th>
          <th>Código Institucional</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody id="lista-instituciones">
      </tbody>
    </table>
  </div>
</div>

<!-- Modal editar institución -->
<div id="modal-editar-institucion" class="modal" role="dialog" aria-modal="true" aria-labelledby="modal-editar-title" aria-hidden="true">
  <div class="modal__backdrop" id="modal-editar-backdrop"></div>
  <div class="modal__box">
    <div class="modal__header">
      <h2 id="modal-editar-title" class="modal__title">Editar institución</h2>
      <button type="button" class="modal__close" id="modal-editar-close" aria-label="Cerrar">×</button>
    </div>
    <form id="form-editar-institucion" class="modal__form">
      <input type="hidden" id="editar-institucion-id" name="id">
      <div class="form-field">
        <label class="form-field__label" for="editar-nombre">Nombre de la Institución</label>
        <input type="text" id="editar-nombre" class="form-field__input" name="nombreInstitucion">
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-cct">CCT</label>
        <input type="text" id="editar-cct" class="form-field__input" name="cct">
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-correo">Correo</label>
        <input type="email" id="editar-correo" class="form-field__input" name="correo">
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-telefono">Teléfono</label>
        <input type="tel" id="editar-telefono" class="form-field__input" name="telefono">
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-estado">Estado</label>
        <select id="editar-estado" class="form-field__select" name="estado">
          <option value="">Selecciona un estado</option>
          <option value="aguascalientes">Aguascalientes</option>
          <option value="baja-california">Baja California</option>
          <option value="baja-california-sur">Baja California Sur</option>
          <option value="campeche">Campeche</option>
          <option value="chiapas">Chiapas</option>
          <option value="chihuahua">Chihuahua</option>
          <option value="ciudad-de-mexico">Ciudad de México</option>
          <option value="coahuila">Coahuila</option>
          <option value="colima">Colima</option>
          <option value="durango">Durango</option>
          <option value="estado-de-mexico">Estado de México</option>
          <option value="guanajuato">Guanajuato</option>
          <option value="guerrero">Guerrero</option>
          <option value="hidalgo">Hidalgo</option>
          <option value="jalisco">Jalisco</option>
          <option value="michoacan">Michoacán</option>
          <option value="morelos">Morelos</option>
          <option value="nayarit">Nayarit</option>
          <option value="nuevo-leon">Nuevo León</option>
          <option value="oaxaca">Oaxaca</option>
          <option value="puebla">Puebla</option>
          <option value="queretaro">Querétaro</option>
          <option value="quintana-roo">Quintana Roo</option>
          <option value="san-luis-potosi">San Luis Potosí</option>
          <option value="sinaloa">Sinaloa</option>
          <option value="sonora">Sonora</option>
          <option value="tabasco">Tabasco</option>
          <option value="tamaulipas">Tamaulipas</option>
          <option value="tlaxcala">Tlaxcala</option>
          <option value="veracruz">Veracruz</option>
          <option value="yucatan">Yucatán</option>
          <option value="zacatecas">Zacatecas</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-ciudad">Ciudad</label>
        <select id="editar-ciudad" class="form-field__select" name="ciudad">
          <option value="">Selecciona primero una ciudad</option>
        </select>
      </div>
      <div class="form-field">
        <label class="form-field__label" for="editar-codigo-institucional">Código Institucional</label>
        <input type="text" id="editar-codigo-institucional" class="form-field__input form-field__input--readonly" name="codigoInstitucional" readonly aria-readonly="true">
      </div>
      <div class="modal__actions">
        <button type="button" class="btn btn--secondary" id="modal-editar-cancelar">Cancelar</button>
        <button type="submit" class="btn btn--primary">Guardar cambios</button>
      </div>
    </form>
  </div>
</div>
